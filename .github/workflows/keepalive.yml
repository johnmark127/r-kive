name: Supabase Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl "https://obbkwgawvlzyuljitqgl.supabase.co/rest/v1/?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}"
